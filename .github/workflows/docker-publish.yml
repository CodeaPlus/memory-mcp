name: Build & Push to Registry

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/production/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/memory-mcp:latest
          # Cache entre builds para acelerar el CI
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/memory-mcp:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/memory-mcp:buildcache,mode=max
