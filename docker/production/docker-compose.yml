services:
  gemini-embed:
    build:
      context: ../gemini-embed
      dockerfile: Dockerfile
    container_name: gemini-embed
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-embedding-2-preview}
      EMBED_DIMENSIONS: ${EMBED_DIMENSIONS:-1536}
      PORT: 8000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - default

  memory-mcp:
    image: memory-mcp:latest
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile
    container_name: memory-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MCP_TRANSPORT: http
      PORT: 3000
      SURREAL_URL: wss://surreal.example.com
      SURREAL_NS: test
      SURREAL_DB: test
      SURREAL_USER: root
      SURREAL_PASS: awesomepassword
    depends_on:
      gemini-embed:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default
